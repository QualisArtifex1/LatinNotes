<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latin Vocab App</title>
    <script type="module" crossorigin src="./assets/index-D4A1KmQX.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-C3CMYIeg.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const findAnalyzeButton = () =>
          Array.from(document.querySelectorAll('button')).find((button) =>
            button.textContent && button.textContent.includes('Analyze')
          );

        const setTextareaValue = (textarea, value) => {
          const setter = Object.getOwnPropertyDescriptor(HTMLTextAreaElement.prototype, 'value')?.set;
          if (setter) {
            setter.call(textarea, value);
          } else {
            textarea.value = value;
          }
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
        };

        const runLookup = (word) => {
          const cleanWord = String(word || '').trim();
          if (!cleanWord) return false;

          const textarea = document.querySelector('textarea[aria-label="Latin passage"]');
          if (!textarea) return false;

          setTextareaValue(textarea, cleanWord);

          let attempts = 0;
          const scrollToResults = () => {
            const detailPanel = document.querySelector('.detail-panel');
            if (detailPanel) {
              detailPanel.scrollIntoView({ block: 'start' });
            }
          };
          const clickWhenReady = () => {
            const button = findAnalyzeButton();
            if (button && !button.disabled) {
              button.click();
              for (let i = 1; i <= 24; i += 1) {
                window.setTimeout(scrollToResults, i * 125);
              }
              return;
            }
            attempts += 1;
            if (attempts < 80) window.setTimeout(clickWhenReady, 50);
          };
          window.setTimeout(clickWhenReady, 50);
          return true;
        };

        const watchForLookup = (word) => {
          if (runLookup(word)) return;
          const observer = new MutationObserver(() => {
            if (runLookup(word)) observer.disconnect();
          });
          observer.observe(document.documentElement, { childList: true, subtree: true });
          window.setTimeout(() => observer.disconnect(), 10000);
        };

        const initialWord = new URLSearchParams(window.location.search).get('q');
        if (initialWord) watchForLookup(initialWord);

        window.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'latin-vocab:lookup') {
            watchForLookup(event.data.word);
          }
        });
      })();
    </script>
  </body>
</html>
